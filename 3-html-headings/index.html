<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        font-family: Arial, sans-serif;
        box-sizing: border-box;
        padding: 0;
        margin: 0;
      }

      body {
        margin: 0;
        padding: 0;
        max-width: 100%;
        overflow-x: hidden;
      }

      .container {
        width: 100vw;
      }

      .home {
        background-color: #011e11;
        width: 100%;
        height: 100vh;
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        padding: 5rem;
      }

      .left h2 {
        color: #12ff46;
        font-size: 1.5rem;
      }

      .left__bottom {
        margin-top: 30%;
        padding: 2rem 0;
        color: white;
      }

      .left__bottom h1 {
        font-size: 6rem;
        line-break: anywher;
      }

      .left__bottom a {
        text-decoration: none;
        padding: 1rem 4rem;
        text-align: center;
        font-size: 1.5rem;
        display: inline-block;
        margin-top: 2rem;
        text-transform: capitalize;
        background-color: #12ff46;
        line-height: 1.6;
        border-radius: 2.5rem;
        cursor: pointer;
        width: 60%;
        color: #010203;
      }

      .right img {
        border-radius: 1rem;
        width: 80%;
      }

      .headings {
        width: 80%;
        margin: 2rem auto;
        padding: 1rem;
      }

      .headings .content {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 2rem;
      }

      .content div {
        height: 6rem;
        background-color: #5eead4;
        border-radius: 0.2rem;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: background-color 0.5s ease-in-out, color 0.5s ease-in-out;
      }

      .content div:hover {
        background-color: #14b8a6;
      }

      .content div * {
        color: #1e1b4b;
      }

      .content div:nth-child(1):hover:before {
        content: "h1";
        position: relative;
        top: -3rem;
        left: 5rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }

      .content div:nth-child(2):hover:before {
        content: "h2";
        position: relative;
        top: -3rem;
        left: 5rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }

      .content div:nth-child(3):hover:before {
        content: "h3";
        position: relative;
        top: -3rem;
        left: 5rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }

      .content div:nth-child(4):hover:before {
        content: "h4";
        position: relative;
        top: -3rem;
        left: 5rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }

      .content div:nth-child(5):hover:before {
        content: "h5";
        position: relative;
        top: -3rem;
        left: 5rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }

      .content div:nth-child(6):hover:before {
        content: "h6";
        position: relative;
        top: -3rem;
        left: 4rem;
        padding: 0.4rem 0.8rem;
        text-align: center;
        background-color: #1e1b4b;
        color: white;
        border-radius: 10px;
      }
    </style>
    <title>Headings</title>
  </head>
  <body>
    <div class="container">
      <div class="home">
        <div class="left">
          <h2 class="left__title">Bernard Konan</h2>
          <div class="left__bottom">
            <h1>Let's Learn Headings</h1>
            <a href="https://www.w3schools.com/html/html_headings.asp"
              >See Full Course</a
            >
          </div>
        </div>
        <div class="right">
          <img src="./assets/logo.png" alt="logo" />
        </div>
      </div>
      <div class="headings">
        <div class="content">
          <div>
            <h1>Hello world</h1>
          </div>
          <div>
            <h2>Hello world</h2>
          </div>
          <div>
            <h3>Hello world</h3>
          </div>
          <div>
            <h4>Hello world</h4>
          </div>
          <div>
            <h5>Hello world</h5>
          </div>
          <div>
            <h6>Hello world</h6>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
