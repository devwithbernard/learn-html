<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles.css">
    <title>Login Page</title>
</head>
<body>
    <div class="container">
        <div class="container-content">
            <div class="row">
                <div class="column column-left">
                    <div class="column-left-top">
                        <img src="./assets/profile-pic.jpg" alt="Profile Picture">
                        <h2>GRADUATE SERVICE</h2>
                    </div>
                    <div class="column-left-bottom">
                        <form action="#"  autocomplete="off" novalidate>
                            <div class="form-control">
                                <input type="email" name="email" id="email"
                                       placeholder="Email Address"
                                       pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,4}$" autofocus>
                            </div>
                            <div class="form-control">
                                <input type="password" name="password"
                                       id="password"
                                       pattern="[0-9].{6,}[A-Za-z]"
                                       placeholder="Password">
                            </div>
                            <div class="form-control">
                                <div class="form-control-content">
                                    <input type="text" name="verification-code"
                                           id="verification-code"
                                           placeholder="Verification code">
                                </div>
                                <span class="verification-code">8AD4F</span>
                            </div>
                            <div class="controls">
                                <div class="control-content">
                                    <button type="submit">Login</button>
                                </div>
                                <div class="control-content">
                                    <a href="#">Forgot Password?</a>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
                <div class="column column-right">
                    <img src="./assets/login.svg" alt="Login Illustration">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
