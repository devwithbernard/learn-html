<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="./styles.css">
    <title>Html Lists</title>
</head>
<body>
    <div class="container">
        <h1>HTML Lists</h1>
        <hr>
        <div class="list-container">
            <h2>Unordered List</h2>
            <hr>
            <p>List of fruits :</p>
            <ul class="unordered-list">
                <li class="list__item">Mango</li>
                <li class="list__item">Banana</li>
                <li class="list__item">Cherry</li>
                <li class="list__item">Apple</li>
            </ul>
        </div>
        <hr>
        <div class="list-container">
            <h2>Ordered List</h2>
            <hr>
            <p>List of celebrity:</p>
            <ol class="ordered-list">
                <li class="list__item">Bernard</li>
                <li class="list__item">John Doe</li>
                <li class="list__item">Jack Ma</li>
                <li class="list__item">Johnny Deep</li>
            </ol>
        </div>
    </div>
</body>
</html>
